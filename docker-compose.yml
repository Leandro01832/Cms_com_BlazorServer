services:
  blazor-app:
    image: blazor-cms
    container_name: meu-site-blazor
    volumes:
      - ./data:/app/data
    networks:
      - projeto-rede
    restart: always

  tunnel:
    image: alpine
    container_name: local-tunnel
    networks:
      - projeto-rede
    # Note que usamos 'blazor-app' porque é o nome do SERVIÇO no YAML
    command: sh -c "apk add --no-cache openssh-client && ssh -o StrictHostKeyChecking=no -R 80:meu-site-blazor:8080 serveo.net"
    restart: always

networks:
  projeto-rede:
    driver: bridge
